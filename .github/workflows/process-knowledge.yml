name: Process Knowledge

# Step 1: source/へのpushでPRを自動作成
on:
  push:
    paths:
      - 'source/**'
      - '!source/.gitkeep'
    branches:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files in source/
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'source/' | grep -v '.gitkeep' || true)
          if [ -z "$FILES" ]; then
            echo "no_files=true" >> $GITHUB_OUTPUT
          else
            echo "no_files=false" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no source files
        if: steps.changed.outputs.no_files == 'true'
        run: echo "No source files to process. Skipping."

      - name: Create processing branch and PR
        if: steps.changed.outputs.no_files == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="knowledge/auto-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # 空コミットでPRを作成（Claude Codeが実際の処理を行う）
          git commit --allow-empty -m "trigger: knowledge processing request"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "ナレッジ処理リクエスト $(date +%Y-%m-%d)" \
            --body "## 処理対象ファイル
          ${{ steps.changed.outputs.files }}

          Claude Codeがsource/内のファイルを解析し、適切なディレクトリに配置します。"
