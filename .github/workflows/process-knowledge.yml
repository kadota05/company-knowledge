name: Process Knowledge

on:
  push:
    paths:
      - 'source/**'
      - '!source/.gitkeep'
    branches:
      - main

jobs:
  process-knowledge:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files in source/
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'source/' | grep -v '.gitkeep' || true)
          if [ -z "$FILES" ]; then
            echo "no_files=true" >> $GITHUB_OUTPUT
          else
            echo "no_files=false" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no source files
        if: steps.changed.outputs.no_files == 'true'
        run: echo "No source files to process. Skipping."

      - name: Create processing branch
        if: steps.changed.outputs.no_files == 'false'
        id: branch
        run: |
          BRANCH="knowledge/auto-$(date +%Y%m%d-%H%M%S)"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

      - name: Install Claude Code
        if: steps.changed.outputs.no_files == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Process knowledge with Claude Code
        if: steps.changed.outputs.no_files == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p --dangerously-skip-permissions "
          あなたはナレッジ管理AIです。
          source/に投入されたファイルを処理し、適切に配置してください。

          ## 処理対象
          source/ディレクトリに以下のファイルが追加されました：
          ${{ steps.changed.outputs.files }}

          ## 処理フロー

          ### Phase 1: 受付・分類
          - 対象ファイルの内容を読んで理解する
          - CLAUDE.mdを読み、フォルダ構成とフォルダごとの運用ルールを確認する

          ### Phase 2: 探索
          - CLAUDE.mdのフォルダ構成から、対象となるディレクトリを特定する
          - 対象ディレクトリ内のファイル一覧と各ファイルの行数を取得する
          - 各ファイルをサブエージェントにReadさせる
            - 読めた場合：今回の追加内容に関連する部分だけ要約して返してもらう
            - エラー（トークン超過）の場合：そのファイルを「分割が必要」としてフラグする
          - 複数ファイルがある場合はサブエージェントを並列で起動する

          ### Phase 3: 計画
          - 探索結果をもとに変更計画を立てる
            - どのファイルをどう変更するか
            - 新規ファイルを作るか
            - 分割が必要なファイルがあればその計画も含める
          - この計画はPRの説明に記載する（Actions版は対話なしで自律実行する）

          ### Phase 4: 実行
          - 計画に従い、ファイルの作成・編集を行う
          - 編集後のファイルをサブエージェントにReadさせてサイズ確認する
            - 読めた → OK
            - エラー → トピック単位で分割を実施する
          - CLAUDE.mdのファイル管理ルール（命名規約・フォーマット等）に従う
          - 処理が完了したら source/ 内の処理済みファイルを削除する（.gitkeepは残す）

          ### Phase 5: 完了
          - 変更内容のサマリーを出力する（PRの説明に使われる）

          ## フォルダ構成のデフォルト解釈ルール
          CLAUDE.mdにフォルダ構成が定義されている場合、以下のルールに従う：
          - 定義された構造は厳守する。定義にないフォルダやファイルをトップレベルや中間フォルダに作らない
          - 中間フォルダ（配下にサブフォルダが定義されているフォルダ）には直下にファイルを作らない
          - 末端フォルダ（配下にサブフォルダが定義されていないフォルダ）の中はファイル・サブフォルダを自由に作成してよい
          CLAUDE.mdにフォルダ構成が「制約なし」と書かれている場合：
          - AIが内容に応じて自由にフォルダ・ファイルを作成・リファクタリングしてよい

          ## 重要な制約
          - ファイルの作成・編集・削除のみ行うこと
          - git commit, git push, gh pr create などのgit操作は絶対に行わないこと
          - ブランチ作成やPR作成は行わないこと
          - これらの操作はワークフローの後続ステップが自動で行う
          "

      - name: Create PR with changes
        if: steps.changed.outputs.no_files == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto: process knowledge from source/

          Processed files: ${{ steps.changed.outputs.files }}

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin "${{ steps.branch.outputs.name }}"

          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "auto: ナレッジ自動処理 $(date +%Y-%m-%d)" \
            --body "## 自動処理されたナレッジ

          ### 処理元ファイル
          ${{ steps.changed.outputs.files }}

          ### 処理内容
          source/に投入されたファイルをClaude Codeが自動で解析し、
          CLAUDE.mdの制約に従って適切に配置・整理しました。

          CODEOWNERSに基づくレビュー承認後にマージしてください。"
